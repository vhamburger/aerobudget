services:
  aerobudget:
    image: vhamburger/aerobudget:latest
    container_name: aerobudget
    ports:
      - "8011:8080"
    volumes:
      # Mount the data directory to persist the SQLite database
      - ./data:/app/data
      # Mount the folder where you can drop PDF invoices for OCR processing
      - ./data/invoices:/app/data/invoices
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_PATH=/app/data/aerobudget.db
      - INVOICE_WATCH_DIR=/app/data/invoices
